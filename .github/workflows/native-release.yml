name: Native release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Resolve and validate release version
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          [[ "$REQUESTED_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]
          git rev-parse --verify "refs/tags/$REQUESTED_TAG"
          app_version="${REQUESTED_TAG#v}"
          cargo_version="$(python -c 'import tomllib; print(tomllib.load(open("Cargo.toml","rb"))["workspace"]["package"]["version"])')"
          [[ "$app_version" == "$cargo_version" ]]
          echo "APP_VERSION=$app_version" >> "$GITHUB_ENV"
      - name: Build native binaries
        run: cargo build --workspace --locked --release --bins --target ${{ matrix.target }}
      - name: Smoke-test native binaries
        shell: bash
        run: |
          set -euo pipefail
          suffix=""
          if [[ "${{ matrix.target }}" == "x86_64-pc-windows-msvc" ]]; then suffix=".exe"; fi
          "target/${{ matrix.target }}/release/aeon-memory${suffix}" --help
          "target/${{ matrix.target }}/release/aeon-memory-server${suffix}" --help
      - name: Package binaries with verified sqlite-vec
        shell: bash
        run: |
          python scripts/package-native-release.py \
            --target "${{ matrix.target }}" \
            --app-version "$APP_VERSION" \
            --binary-dir "target/${{ matrix.target }}/release" \
            --output-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: aeon-memory-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          pattern: aeon-memory-*
          path: dist
          merge-multiple: true
      - name: Verify artifacts and publish fixed-tag release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git rev-parse --verify "refs/tags/$REQUESTED_TAG"
          test "$(find dist -maxdepth 1 -type f \( -name '*.tar.gz' -o -name '*.zip' \) | wc -l)" -eq 5
          (cd dist && sha256sum *.tar.gz *.zip > SHA256SUMS)
          if gh release view "$REQUESTED_TAG" >/dev/null 2>&1; then
            gh release upload "$REQUESTED_TAG" dist/* --clobber
          else
            gh release create "$REQUESTED_TAG" dist/* \
              --verify-tag \
              --title "Aeon Memory $REQUESTED_TAG" \
              --generate-notes
          fi
